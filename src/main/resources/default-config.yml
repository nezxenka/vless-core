# ===================================
# VLESS Core - Server Configuration
# ===================================

server-name: Proxy
port: 443
tls-enabled: false
tls-cert-path: ""
tls-key-path: ""
database-file: data.db
default-token-days: 30
worker-threads: 0
log-level: INFO

# SOCKS5 Proxy
socks5-enabled: true
socks5-port: 25000
socks5-auth-enabled: true

# API Server
api-enabled: true
api-port: 8080
api-secret: CHANGE_ME_SECRET_KEY_123

# Silent mode: suppress connection logs
# Toggle at runtime: /silent
silent-mode: true
